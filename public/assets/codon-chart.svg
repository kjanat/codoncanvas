<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="850" viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg">
	<defs>
		<style>
			.title {
				font: bold 32px monospace;
				fill: #1a1a1a;
			}
			.section-title {
				font: bold 18px monospace;
				fill: #2a2a2a;
			}
			.codon {
				font: bold 14px monospace;
			}
			.opcode {
				font: 12px monospace;
				fill: #4a4a4a;
			}
			.stack-effect {
				font: 11px monospace;
				fill: #666;
			}
			.description {
				font: 11px sans-serif;
				fill: #555;
			}

			/* Color families by opcode category */
			.control {
				fill: #e74c3c;
			} /* Red */
			.drawing {
				fill: #3498db;
			} /* Blue */
			.transform {
				fill: #2ecc71;
			} /* Green */
			.stack {
				fill: #f39c12;
			} /* Orange */
			.utility {
				fill: #95a5a6;
			} /* Gray */
			.advanced {
				fill: #9b59b6;
			} /* Purple */

			.box {
				fill: none;
				stroke: #ddd;
				stroke-width: 2;
				rx: 5;
			}
			.box-header {
				fill: #f8f9fa;
				stroke: #ddd;
				stroke-width: 2;
			}
		</style>
	</defs>

	<!-- Background -->
	<rect width="1100" height="850" fill="#ffffff" />

	<!-- Title -->
	<text class="title" x="550" y="40" text-anchor="middle">
		CodonCanvas Codon Chart
	</text>
	<text x="550" y="65" style="font: 14px sans-serif; fill: #666;" text-anchor="middle">
		Complete 64-Codon Reference (v1.0)
	</text>

	<!-- CONTROL FLOW (Top Left) -->
	<g id="control">
		<rect class="box-header" x="20" y="90" width="260" height="30" />
		<text class="section-title" x="150" y="111" text-anchor="middle">
			CONTROL FLOW
		</text>
		<rect class="box" x="20" y="120" width="260" height="110" />

		<text class="codon control" x="40" y="145">
			ATG
		</text>
		<text class="opcode" x="100" y="145">
			START
		</text>
		<text class="stack-effect" x="40" y="162">
			[] → []
		</text>
		<text class="description" x="40" y="176">
			Begin execution
		</text>

		<text class="codon control" x="40" y="200">
			TAA / TAG / TGA
		</text>
		<text class="opcode" x="40" y="217">
			STOP (3 synonyms)
		</text>
		<text class="stack-effect" x="40" y="232">
			[] → []
		</text>
	</g>

	<!-- DRAWING PRIMITIVES (Top Middle-Left) -->
	<g id="drawing">
		<rect class="box-header" x="300" y="90" width="260" height="30" />
		<text class="section-title" x="430" y="111" text-anchor="middle">
			DRAWING PRIMITIVES
		</text>
		<rect class="box" x="300" y="120" width="260" height="300" />

		<text class="codon drawing" x="320" y="145">
			GGA / GGC / GGG / GGT
		</text>
		<text class="opcode" x="320" y="162">
			CIRCLE (4 synonyms)
		</text>
		<text class="stack-effect" x="320" y="177">
			[radius] → []
		</text>

		<text class="codon drawing" x="320" y="202">
			CCA / CCC / CCG / CCT
		</text>
		<text class="opcode" x="320" y="219">
			RECT (4 synonyms)
		</text>
		<text class="stack-effect" x="320" y="234">
			[w, h] → []
		</text>

		<text class="codon drawing" x="320" y="259">
			AAA / AAC / AAG / AAT
		</text>
		<text class="opcode" x="320" y="276">
			LINE (4 synonyms)
		</text>
		<text class="stack-effect" x="320" y="291">
			[length] → []
		</text>

		<text class="codon drawing" x="320" y="316">
			GCA / GCC / GCG / GCT
		</text>
		<text class="opcode" x="320" y="333">
			TRIANGLE (4 synonyms)
		</text>
		<text class="stack-effect" x="320" y="348">
			[size] → []
		</text>

		<text class="codon drawing" x="320" y="373">
			GTA / GTC / GTG / GTT
		</text>
		<text class="opcode" x="320" y="390">
			ELLIPSE (4 synonyms)
		</text>
		<text class="stack-effect" x="320" y="405">
			[rx, ry] → []
		</text>
	</g>

	<!-- TRANSFORM OPERATIONS (Top Right) -->
	<g id="transform">
		<rect class="box-header" x="580" y="90" width="260" height="30" />
		<text class="section-title" x="710" y="111" text-anchor="middle">
			TRANSFORMS
		</text>
		<rect class="box" x="580" y="120" width="260" height="300" />

		<text class="codon transform" x="600" y="145">
			ACA / ACC / ACG / ACT
		</text>
		<text class="opcode" x="600" y="162">
			TRANSLATE (4 synonyms)
		</text>
		<text class="stack-effect" x="600" y="177">
			[dx, dy] → []
		</text>

		<text class="codon transform" x="600" y="202">
			AGA / AGC / AGG / AGT
		</text>
		<text class="opcode" x="600" y="219">
			ROTATE (4 synonyms)
		</text>
		<text class="stack-effect" x="600" y="234">
			[degrees] → []
		</text>

		<text class="codon transform" x="600" y="259">
			CGA / CGC / CGG / CGT
		</text>
		<text class="opcode" x="600" y="276">
			SCALE (4 synonyms)
		</text>
		<text class="stack-effect" x="600" y="291">
			[factor] → []
		</text>

		<text class="codon transform" x="600" y="316">
			TTA / TTC / TTG / TTT
		</text>
		<text class="opcode" x="600" y="333">
			COLOR (4 synonyms)
		</text>
		<text class="stack-effect" x="600" y="348">
			[h, s, l] → []
		</text>
		<text class="description" x="600" y="363">
			h=0-360, s/l=0-100
		</text>
	</g>

	<!-- STACK OPERATIONS (Middle Left) -->
	<g id="stack">
		<rect class="box-header" x="20" y="250" width="260" height="30" />
		<text class="section-title" x="150" y="271" text-anchor="middle">
			STACK OPERATIONS
		</text>
		<rect class="box" x="20" y="280" width="260" height="140" />

		<text class="codon stack" x="40" y="305">
			GAA / GAC / GAG / GAT
		</text>
		<text class="opcode" x="40" y="322">
			PUSH (4 synonyms)
		</text>
		<text class="stack-effect" x="40" y="337">
			[] → [value]
		</text>
		<text class="description" x="40" y="352">
			Next codon = base-4 value
		</text>

		<text class="codon stack" x="40" y="377">
			ATA / ATC / ATT
		</text>
		<text class="opcode" x="40" y="394">
			DUP (3 synonyms)
		</text>
		<text class="stack-effect" x="40" y="409">
			[a] → [a, a]
		</text>
	</g>

	<!-- UTILITY (Far Right Top) -->
	<g id="utility">
		<rect class="box-header" x="860" y="90" width="220" height="30" />
		<text class="section-title" x="970" y="111" text-anchor="middle">
			UTILITY
		</text>
		<rect class="box" x="860" y="120" width="220" height="140" />

		<text class="codon utility" x="880" y="145">
			CAA / CAC / CAG / CAT
		</text>
		<text class="opcode" x="880" y="162">
			NOP (4 synonyms)
		</text>
		<text class="stack-effect" x="880" y="177">
			[] → []
		</text>
		<text class="description" x="880" y="192">
			No operation, spacing
		</text>

		<text class="codon utility" x="880" y="217">
			TAC / TAT / TGC
		</text>
		<text class="opcode" x="880" y="234">
			POP (3 synonyms)
		</text>
		<text class="stack-effect" x="880" y="249">
			[a] → []
		</text>
	</g>

	<!-- ADVANCED OPERATIONS (Bottom Left) -->
	<g id="advanced">
		<rect class="box-header" x="20" y="440" width="520" height="30" />
		<text class="section-title" x="280" y="461" text-anchor="middle">
			ADVANCED OPERATIONS
		</text>
		<rect class="box" x="20" y="470" width="520" height="140" />

		<text class="codon advanced" x="40" y="495">
			TGG / TGT
		</text>
		<text class="opcode" x="150" y="495">
			SWAP (2 synonyms)
		</text>
		<text class="stack-effect" x="300" y="495">
			[a, b] → [b, a]
		</text>

		<text class="codon advanced" x="40" y="525">
			CTA / CTC / CTG / CTT
		</text>
		<text class="opcode" x="150" y="525">
			NOISE (4 synonyms)
		</text>
		<text class="stack-effect" x="300" y="525">
			[seed, intensity] → []
		</text>
		<text class="description" x="300" y="542">
			Add visual texture/effects
		</text>

		<text class="codon advanced" x="40" y="572">
			TCA / TCC / TCG / TCT
		</text>
		<text class="opcode" x="150" y="572">
			SAVE_STATE (4 synonyms)
		</text>
		<text class="stack-effect" x="300" y="572">
			[] → []
		</text>
		<text class="description" x="300" y="589">
			Save transform state to stack
		</text>
	</g>

	<!-- BASE-4 ENCODING (Bottom Right) -->
	<g id="base4">
		<rect class="box-header" x="560" y="440" width="520" height="30" />
		<text class="section-title" x="820" y="461" text-anchor="middle">
			BASE-4 NUMERIC ENCODING
		</text>
		<rect class="box" x="560" y="470" width="520" height="170" />

		<text x="580" y="495" style="font: bold 13px monospace; fill: #333;">
			After PUSH, next codon encodes value 0-63:
		</text>
		<text x="580" y="515" style="font: 12px monospace; fill: #555;">
			A=0, C=1, G=2, T=3
		</text>
		<text x="580" y="535" style="font: 12px monospace; fill: #555;">
			value = d1×16 + d2×4 + d3
		</text>

		<text x="580" y="562" style="font: bold 12px monospace; fill: #f39c12;">
			Examples:
		</text>
		<text x="600" y="582" style="font: 11px monospace; fill: #333;">
			AAA = 0×16 + 0×4 + 0 = 0
		</text>
		<text x="600" y="597" style="font: 11px monospace; fill: #333;">
			CCC = 1×16 + 1×4 + 1 = 21
		</text>
		<text x="600" y="612" style="font: 11px monospace; fill: #333;">
			TTT = 3×16 + 3×4 + 3 = 63
		</text>
		<text x="600" y="627" style="font: 11px monospace; fill: #333;">
			TCA = 3×16 + 1×4 + 0 = 52
		</text>
	</g>

	<!-- LEGEND (Bottom) -->
	<g id="legend">
		<rect class="box-header" x="20" y="630" width="1060" height="30" />
		<text class="section-title" x="550" y="651" text-anchor="middle">
			PEDAGOGICAL NOTES
		</text>
		<rect class="box" x="20" y="660" width="1060" height="170" />

		<text x="40" y="685" style="font: bold 12px sans-serif; fill: #333;">
			🧬 Genetic Code Parallels:
		</text>
		<text x="60" y="705" style="font: 11px sans-serif; fill: #555;">
			•
			<tspan style="font-weight: bold;">
				Synonymous codons
			</tspan>
			(4 per family) model redundancy - silent mutations don't change output
		</text>
		<text x="60" y="722" style="font: 11px sans-serif; fill: #555;">
			•
			<tspan style="font-weight: bold;">
				Missense mutations
			</tspan>
			change opcode families (GGA→CCA: CIRCLE→RECT) - visible output change
		</text>
		<text x="60" y="739" style="font: 11px sans-serif; fill: #555;">
			•
			<tspan style="font-weight: bold;">
				Nonsense mutations
			</tspan>
			introduce early STOP - truncated phenotype
		</text>
		<text x="60" y="756" style="font: 11px sans-serif; fill: #555;">
			•
			<tspan style="font-weight: bold;">
				Frameshift mutations
			</tspan>
			(±1 or ±2 bases) scramble ALL downstream codons - catastrophic changes
		</text>

		<text x="40" y="783" style="font: bold 12px sans-serif; fill: #333;">
			📝 Usage Tips:
		</text>
		<text x="60" y="803" style="font: 11px sans-serif; fill: #555;">
			• Always start with ATG, end with TAA/TAG/TGA • Use semicolons for comments • Only A/C/G/T bases • Total bases must be ÷3
		</text>
	</g>

	<!-- Footer -->
	<text x="550" y="845" style="font: 10px sans-serif; fill: #999;" text-anchor="middle">
		CodonCanvas v1.0 | Educational DNA-Inspired Programming Language | github.com/codoncanvas
	</text>
</svg>
