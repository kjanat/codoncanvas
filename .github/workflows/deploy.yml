name: Deploy to GitHub Pages
run-name: "${{ github.event_name == 'pull_request' && 'Check Pages' || 'Deploy Pages' }} / ${{ github.head_ref || github.ref_name }} / #${{ github.run_number }} by @${{ github.actor }}"

on:
  push: { branches: [master] }
  pull_request: { branches: [master] }
  workflow_dispatch: {}
permissions: { contents: read }

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: { group: "pages-build-${{ github.event_name }}-${{ github.ref }}", cancel-in-progress: true }
    steps:
      - uses: actions/checkout@v6
        with: { persist-credentials: false }
      - uses: taiki-e/install-action@v2
        with: { tool: rust+rustfmt+wasm32-unknown-unknown,wasm-bindgen,cargo-binstall }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: engine }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with: { node-version: latest }

      - name: Install web dependencies
        working-directory: web
        run: bun install
      - name: Build (Rust → WASM → Svelte)
        working-directory: web
        run: bun run build || cargo binstall wasm-bindgen-cli && bun run build

      - name: Setup Pages
        if: contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name)
        uses: actions/configure-pages@v6
        id: pages
      - name: Upload artifact
        if: contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name)
        uses: actions/upload-pages-artifact@v5
        with: { path: ./web/dist }

  deploy:
    concurrency: { group: pages-deploy, cancel-in-progress: false }
    permissions: { pages: write, id-token: write }
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    runs-on: ubuntu-latest
    if: contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name)
    needs: build
    steps: [{ name: "Deploy to GitHub Pages", id: deployment, uses: actions/deploy-pages@v5 }]
