name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Test
        working-directory: engine
        run: cargo test
      - name: Clippy
        working-directory: engine
        run: cargo clippy --all-targets -- -D warnings

  web:
    name: Web (Svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.123
      - uses: oven-sh/setup-bun@v2
      - name: Install
        working-directory: web
        run: bun install
      - name: Build (Rust → WASM → Svelte)
        working-directory: web
        run: bun run build
      - name: Type check
        working-directory: web
        run: bun run check

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: dprint, just, tombi
      - name: dprint check
        run: dprint check
